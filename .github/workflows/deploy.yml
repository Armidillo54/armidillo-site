name: Deploy Armidillo Site to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: c9f91129323d8a3a030f65b44f19c3f5
          command: pages deploy . --project-name=armidillo-site --branch=main

      - name: Notify IndexNow (Bing / Yandex)
        run: node scripts/indexnow-submit.mjs
        continue-on-error: true
